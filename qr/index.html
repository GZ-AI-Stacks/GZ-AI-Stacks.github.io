<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>QR-Code entschlüsseln · GZ-AI.-Stacks</title>
<style>
:root{
  --bg:#05060a; --panel:#0b0e16; --panel-2:#10141f;
  --fg:#e8f0ff; --muted:#8aa0c2;
  --green:#00FFAA; --cyan:#00B4FF; --purple:#8C00FF; --pink:#FF0080;
  --error:#ff4d6d; --warn:#ffb454;
  --border:rgba(0,180,255,.25);
  --shadow:0 0 30px rgba(0,180,255,.15);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body.light{
  --bg:#f4f7fc; --panel:#ffffff; --panel-2:#eef3fa;
  --fg:#0a1224; --muted:#56627a;
  --border:rgba(140,0,255,.3);
  --shadow:0 0 30px rgba(140,0,255,.12);
}
canvas#matrix{position:fixed;inset:0;z-index:-1;opacity:.35}
body.light canvas#matrix{opacity:.18}

.wrap{max-width:560px;margin:0 auto;padding:32px 20px 80px;position:relative;z-index:1}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.brand{font-weight:700;letter-spacing:.05em;font-size:14px;color:var(--cyan);text-transform:uppercase}
.brand span{color:var(--green)}
.theme-btn{background:transparent;border:1px solid var(--border);color:var(--fg);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.theme-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.theme-btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

h1{font-size:22px;margin:0 0 6px;color:var(--green);font-weight:700;letter-spacing:.02em}
.sub{color:var(--muted);font-size:14px;margin:0 0 24px}

.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;box-shadow:var(--shadow)}
.row{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
label{font-size:13px;color:var(--muted);font-weight:500}
input[type=password],input[type=text]{
  background:var(--panel-2);border:1px solid var(--border);color:var(--fg);
  padding:12px 14px;border-radius:8px;font-size:15px;font-family:inherit;
  transition:border-color .15s;
}
input[type=password]:focus,input[type=text]:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,180,255,.15)}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--muted);cursor:pointer;padding:6px 10px;font-size:13px}
.pw-toggle:hover{color:var(--cyan)}
.pw-toggle:focus-visible{outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px}

button.primary{
  width:100%;background:linear-gradient(135deg,var(--cyan),var(--purple));
  color:#fff;border:none;padding:14px 20px;border-radius:8px;
  font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.03em;
  transition:transform .1s,box-shadow .15s;
}
button.primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,180,255,.4)}
button.primary:focus-visible{outline:2px solid var(--green);outline-offset:2px}
button.primary:disabled{opacity:.5;cursor:not-allowed}

.msg{margin-top:14px;padding:12px 14px;border-radius:8px;font-size:14px;display:none}
.msg.error{display:block;background:rgba(255,77,109,.1);border:1px solid var(--error);color:var(--error)}
.msg.warn{display:block;background:rgba(255,180,84,.1);border:1px solid var(--warn);color:var(--warn)}

.result{display:none;margin-top:24px}
.result.show{display:block}
.result-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.result-box{
  background:var(--panel-2);border:1px solid var(--green);border-radius:8px;
  padding:16px;font-size:15px;line-height:1.5;word-break:break-word;
  white-space:pre-wrap;max-height:340px;overflow:auto;
}
.result-box a{color:var(--cyan);text-decoration:underline}
.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.actions button{
  background:var(--panel-2);border:1px solid var(--border);color:var(--fg);
  padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;
}
.actions button:hover{border-color:var(--green);color:var(--green)}
.actions button:focus-visible{outline:2px solid var(--green);outline-offset:2px}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

footer{margin-top:32px;text-align:center;font-size:12px;color:var(--muted)}
footer a{color:var(--cyan);text-decoration:none}
footer a:hover{text-decoration:underline}

@media (max-width:480px){
  .wrap{padding:20px 14px 60px}
  .card{padding:18px}
  h1{font-size:19px}
}
@media (prefers-reduced-motion:reduce){
  canvas#matrix{display:none}
  *{animation-duration:.001ms !important}
}
</style>
</head>
<body>
<canvas id="matrix" aria-hidden="true"></canvas>

<div class="wrap">
  <header>
    <div class="brand">GZ-AI.-<span>Stacks</span> · QR Decrypt</div>
    <button class="theme-btn" id="theme-toggle" aria-label="Theme wechseln">🌙 Dark</button>
  </header>

  <h1>QR-Code entschlüsseln</h1>
  <p class="sub">Dieser QR-Code ist passwortgeschützt. Gib das Passwort ein, um den Inhalt zu sehen.</p>

  <main class="card" role="main">
    <form id="form" autocomplete="off">
      <div class="row">
        <label for="pw">Passwort</label>
        <div class="pw-wrap">
          <input type="password" id="pw" name="pw" required autocomplete="off"
                 aria-describedby="msg" autofocus>
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Passwort anzeigen">👁</button>
        </div>
      </div>
      <button type="submit" class="primary" id="submit">Entschlüsseln</button>
    </form>

    <div id="msg" class="msg" role="status" aria-live="polite"></div>

    <section class="result" id="result" aria-live="polite">
      <div class="result-label">Inhalt</div>
      <div class="result-box" id="result-box"></div>
      <div class="actions">
        <button type="button" id="copy-btn">📋 Kopieren</button>
        <button type="button" id="open-btn" style="display:none">🔗 Öffnen</button>
      </div>
    </section>
  </main>

  <footer>
    <a href="https://www.gz-ai-stacks.de">www.gz-ai-stacks.de</a> ·
    AES-256-GCM · Entschlüsselung läuft 100% im Browser
  </footer>
</div>

<script>
/* ═══ Matrix-Regen ═══ */
(function(){
  var c = document.getElementById('matrix');
  if (!c || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var ctx = c.getContext('2d');
  var chars = 'アァカサタナハマヤラワABCDEFGHIJ0123456789#@*+';
  var cols, drops;
  function resize(){
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    cols = Math.floor(c.width / 16);
    drops = Array(cols).fill(0).map(function(){return Math.random() * c.height / 16});
  }
  resize();
  window.addEventListener('resize', resize);
  function draw(){
    ctx.fillStyle = 'rgba(5,6,10,0.08)';
    ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle = '#00FFAA';
    ctx.font = '14px monospace';
    for (var i = 0; i < drops.length; i++){
      var t = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(t, i * 16, drops[i] * 16);
      if (drops[i] * 16 > c.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  setInterval(draw, 55);
})();

/* ═══ Theme ═══ */
(function(){
  var btn = document.getElementById('theme-toggle');
  var saved = localStorage.getItem('qr-theme') || 'dark';
  if (saved === 'light'){ document.body.classList.add('light'); btn.textContent = '☀ Light'; }
  btn.addEventListener('click', function(){
    document.body.classList.toggle('light');
    var isLight = document.body.classList.contains('light');
    btn.textContent = isLight ? '☀ Light' : '🌙 Dark';
    localStorage.setItem('qr-theme', isLight ? 'light' : 'dark');
  });
})();

/* ═══ Passwort-Sichtbarkeit ═══ */
document.getElementById('pw-toggle').addEventListener('click', function(){
  var pw = document.getElementById('pw');
  var isPw = pw.type === 'password';
  pw.type = isPw ? 'text' : 'password';
  this.setAttribute('aria-label', isPw ? 'Passwort verbergen' : 'Passwort anzeigen');
  this.textContent = isPw ? '🙈' : '👁';
});

/* ═══ AES-256-GCM Entschlüsselung ═══ */
function b64urlToBytes(s){
  s = s.replace(/-/g,'+').replace(/_/g,'/');
  while (s.length % 4) s += '=';
  var bin = atob(s);
  var out = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function decryptQR(b64url, password){
  var combined = b64urlToBytes(b64url);
  if (combined.length < 16 + 12 + 16){
    throw new Error('Daten zu kurz - kein gültiger verschlüsselter QR-Code.');
  }
  var salt = combined.slice(0, 16);
  var iv = combined.slice(16, 28);
  var ct = combined.slice(28);
  var enc = new TextEncoder();
  var keyMat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  var key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    keyMat,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
  var pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
  return new TextDecoder().decode(pt);
}

/* ═══ Hash auslesen ═══ */
function getEncryptedFromHash(){
  var h = window.location.hash || '';
  if (h.indexOf('#d=') === 0) return h.slice(3);
  return null;
}

/* ═══ Result rendern (Link-Erkennung, XSS-sicher) ═══ */
function renderResult(text){
  var box = document.getElementById('result-box');
  box.textContent = '';
  var urlRegex = /(https?:\/\/[^\s]+)/g;
  var lastIdx = 0;
  var m;
  while ((m = urlRegex.exec(text)) !== null){
    if (m.index > lastIdx) box.appendChild(document.createTextNode(text.slice(lastIdx, m.index)));
    var a = document.createElement('a');
    a.href = m[0];
    a.textContent = m[0];
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    box.appendChild(a);
    lastIdx = m.index + m[0].length;
  }
  if (lastIdx < text.length) box.appendChild(document.createTextNode(text.slice(lastIdx)));

  document.getElementById('result').classList.add('show');

  var openBtn = document.getElementById('open-btn');
  var trimmed = text.trim();
  if (/^https?:\/\/\S+$/.test(trimmed)){
    openBtn.style.display = '';
    openBtn.onclick = function(){ window.open(trimmed, '_blank', 'noopener,noreferrer'); };
  } else {
    openBtn.style.display = 'none';
  }
}

/* ═══ UI-Logik ═══ */
function showMsg(type, text){
  var m = document.getElementById('msg');
  m.className = 'msg ' + type;
  m.textContent = text;
}
function clearMsg(){
  var m = document.getElementById('msg');
  m.className = 'msg';
  m.textContent = '';
}

document.getElementById('form').addEventListener('submit', async function(e){
  e.preventDefault();
  clearMsg();
  document.getElementById('result').classList.remove('show');

  var encrypted = getEncryptedFromHash();
  if (!encrypted){
    showMsg('warn', 'Kein verschlüsselter Inhalt im Link gefunden. Diese Seite öffnest du normalerweise über einen passwortgeschützten QR-Code.');
    return;
  }
  var pw = document.getElementById('pw').value;
  if (!pw){ showMsg('warn', 'Bitte Passwort eingeben.'); return; }

  var btn = document.getElementById('submit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Entschlüssele…';

  try {
    var plaintext = await decryptQR(encrypted, pw);
    renderResult(plaintext);
    document.getElementById('pw').value = '';
  } catch(err){
    showMsg('error', 'Falsches Passwort oder beschädigter QR-Code.');
    console.warn('[QR-Decrypt]', err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Entschlüsseln';
  }
});

document.getElementById('copy-btn').addEventListener('click', async function(){
  var text = document.getElementById('result-box').textContent;
  try {
    await navigator.clipboard.writeText(text);
    this.textContent = '✓ Kopiert';
    var self = this;
    setTimeout(function(){ self.textContent = '📋 Kopieren'; }, 1500);
  } catch(e){
    showMsg('error', 'Kopieren fehlgeschlagen.');
  }
});

/* ═══ Init: Hash prüfen ═══ */
(function(){
  if (!getEncryptedFromHash()){
    showMsg('warn', 'Kein verschlüsselter Inhalt im Link gefunden. Diese Seite öffnest du normalerweise über einen passwortgeschützten QR-Code.');
    document.getElementById('submit').disabled = true;
  }
})();
</script>
</body>
</html>
